services:
  xboard:
    image: ghcr.io/cedar2025/xboard:latest
    ports:
      - "127.0.0.1:7001:7001"
    volumes:
      - ./.env:/www/.env
      - ./MailService.php:/www/app/Services/MailService.php
      - ./admin.blade.php:/www/resources/views/admin.blade.php
      - ./custom_mail:/www/resources/views/mail
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - ./public/admin:/www/public/admin
      - ./public/assets:/www/public/assets
      - ./public/pay-usdt-erc20:/www/public/pay-usdt-erc20
      - ./public/pay-usdc-erc20:/www/public/pay-usdc-erc20
      - ./public/pay-usdt-trc20:/www/public/pay-usdt-trc20
      - ./app/Http/Controllers/V1/Guest/TelegramController.php:/www/app/Http/Controllers/V1/Guest/TelegramController.php
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=balanced
      - ENABLE_HORIZON=true
      - docker=true
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "composer require resend/resend-laravel -q && php artisan octane:start --host=0.0.0.0 --port=7001"
    restart: on-failure

  horizon:
    image: ghcr.io/cedar2025/xboard:latest
    volumes:
      - ./.env:/www/.env
      - ./MailService.php:/www/app/Services/MailService.php
      - ./custom_mail:/www/resources/views/mail
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - ./public/pay-usdt-erc20:/www/public/pay-usdt-erc20
      - ./public/pay-usdc-erc20:/www/public/pay-usdc-erc20
      - ./public/pay-usdt-trc20:/www/public/pay-usdt-trc20
      - ./app/Http/Controllers/V1/Guest/TelegramController.php:/www/app/Http/Controllers/V1/Guest/TelegramController.php
      - redis-data:/data
    restart: on-failure
    command: sh -c "composer require resend/resend-laravel -q && php artisan horizon"
    depends_on:
      redis:
        condition: service_healthy

  ws-server:
    image: ghcr.io/cedar2025/xboard:latest
    volumes:
      - ./.env:/www/.env
      - ./custom_mail:/www/resources/views/mail
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./plugins:/www/plugins
      - ./public/pay-usdt-erc20:/www/public/pay-usdt-erc20
      - ./public/pay-usdc-erc20:/www/public/pay-usdc-erc20
      - ./public/pay-usdt-trc20:/www/public/pay-usdt-trc20
      - ./app/Http/Controllers/V1/Guest/TelegramController.php:/www/app/Http/Controllers/V1/Guest/TelegramController.php
      - redis-data:/data
    command: php artisan ws-server start
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    ports:
      - "127.0.0.1:8076:8076"

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 900 1 --save 300 10 --save 60 10000
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
